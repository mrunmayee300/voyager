# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect GitHub repo → New Blueprint → select render.yaml

services:
  - type: web
    name: voyager-api
    runtime: node
    plan: free
    region: oregon
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npm run db:generate && npm run build --workspace=@voyager/api
    startCommand: npm run start:prod --workspace=@voyager/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: OSM_USER_AGENT
        value: VoyagerTravelApp/1.0 (contact@voyager.app)

databases:
  - name: voyager-db
    plan: free
    databaseName: voyager
    user: voyager
